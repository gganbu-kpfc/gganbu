<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>깐부파트너스 | 실행 중심 비즈니스 플랫폼</title>
  <meta
    name="description"
    content="깐부파트너스는 마케팅 실행, AI 솔루션, 경영컨설팅, 신차 플랫폼, 휴대폰·렌탈·태양광·부업 브랜드를 운영하는 실행 중심 비즈니스 플랫폼입니다."
  />
  <style>
    :root {
      --navy-950: #071428;
      --navy-900: #0b1f3a;
      --navy-800: #12345d;
      --blue-700: #2563eb;
      --blue-600: #2f6bff;
      --blue-500: #4f7cff;
      --violet-600: #6d28d9;
      --sky-100: #ecf4ff;
      --sky-50: #f7faff;
      --gray-950: #111827;
      --gray-900: #1f2937;
      --gray-800: #334155;
      --gray-700: #475569;
      --gray-600: #64748b;
      --gray-500: #94a3b8;
      --gray-300: #cbd5e1;
      --gray-200: #e2e8f0;
      --gray-100: #f1f5f9;
      --gray-50: #f8fafc;
      --white: #ffffff;
      --yellow-kakao: #fee500;
      --black: #111111;
      --green: #15b981;
      --red: #ef4444;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow-lg: 0 28px 60px rgba(7, 20, 40, 0.16);
      --shadow-md: 0 16px 40px rgba(7, 20, 40, 0.12);
      --shadow-sm: 0 10px 24px rgba(7, 20, 40, 0.08);
      --max: 1280px;
      --header-h: 86px;
      --section-py: 112px;
      --section-px: 24px;
      --line: 1px solid rgba(148, 163, 184, 0.22);
      --transition: 0.28s ease;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      color: var(--gray-950);
      background: var(--white);
      line-height: 1.72;
      letter-spacing: -0.02em;
      word-break: keep-all;
      overflow-x: hidden;
    }

    img {
      display: block;
      width: 100%;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .container {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding-left: var(--section-px);
      padding-right: var(--section-px);
    }

    .section {
      position: relative;
      padding: var(--section-py) 0;
    }

    .section-tight {
      padding: 84px 0;
    }

    .section-dark {
      color: var(--white);
      background: linear-gradient(135deg, var(--navy-950), var(--navy-900) 58%, #132d66);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(47, 107, 255, 0.1);
      color: var(--blue-700);
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 18px;
    }

    .section-dark .eyebrow {
      background: rgba(255, 255, 255, 0.12);
      color: #dce8ff;
    }

    .title-wrap {
      max-width: 780px;
      margin-bottom: 38px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: clamp(31px, 4.2vw, 56px);
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .section-desc {
      margin: 0;
      font-size: clamp(16px, 2vw, 20px);
      color: var(--gray-700);
      line-height: 1.85;
    }

    .section-dark .section-desc {
      color: rgba(255, 255, 255, 0.82);
    }

    .accent {
      color: var(--blue-700);
      font-weight: 900;
    }

    .accent-violet {
      color: var(--violet-600);
      font-weight: 900;
    }

    .accent-white {
      color: #ffffff;
      font-weight: 900;
    }

    .muted {
      color: var(--gray-600);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.78s ease, transform 0.78s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    .delay-1 {
      transition-delay: 0.08s;
    }

    .delay-2 {
      transition-delay: 0.16s;
    }

    .delay-3 {
      transition-delay: 0.24s;
    }

    .delay-4 {
      transition-delay: 0.32s;
    }

    header.site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1100;
      height: var(--header-h);
      transition: background var(--transition), box-shadow var(--transition), border-color var(--transition);
      background: rgba(7, 20, 40, 0.18);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    header.site-header.scrolled {
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .header-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue-600), var(--violet-600));
      display: grid;
      place-items: center;
      box-shadow: 0 12px 22px rgba(79, 124, 255, 0.3);
      flex-shrink: 0;
    }

    .brand-mark svg {
      width: 24px;
      height: 24px;
      stroke: #fff;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-name {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #fff;
      transition: color var(--transition);
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.76);
      transition: color var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    header.site-header.scrolled .brand-name {
      color: var(--gray-950);
    }

    header.site-header.scrolled .brand-sub {
      color: var(--gray-600);
    }

    nav.gnb {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gnb-list {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .gnb-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 15px;
      font-weight: 700;
      transition: background var(--transition), color var(--transition), transform var(--transition);
    }

    .gnb-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.1);
    }

    .gnb-link svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    header.site-header.scrolled .gnb-link {
      color: var(--gray-800);
    }

    header.site-header.scrolled .gnb-link:hover {
      background: var(--gray-100);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 22px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue-600), var(--violet-600));
      color: var(--white);
      box-shadow: 0 16px 30px rgba(59, 91, 219, 0.28);
    }

    .btn-primary:hover {
      box-shadow: 0 22px 34px rgba(59, 91, 219, 0.32);
    }

    .btn-dark {
      background: var(--black);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }

    .btn-dark:hover {
      background: #000;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    header.site-header.scrolled .btn-ghost {
      background: var(--gray-100);
      color: var(--gray-900);
      border-color: rgba(148, 163, 184, 0.18);
    }

    .mobile-menu-btn {
      display: none;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: 0;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .mobile-menu-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    header.site-header.scrolled .mobile-menu-btn {
      background: var(--gray-100);
      color: var(--gray-900);
    }

    .mobile-drawer {
      position: fixed;
      top: 0;
      right: -100%;
      width: min(90vw, 420px);
      height: 100dvh;
      background: #fff;
      z-index: 1400;
      box-shadow: -16px 0 40px rgba(15, 23, 42, 0.12);
      transition: right 0.32s ease;
      display: flex;
      flex-direction: column;
    }

    .mobile-drawer.open {
      right: 0;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.55);
      z-index: 1300;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .drawer-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 14px;
      border-bottom: var(--line);
    }

    .drawer-title {
      font-size: 19px;
      font-weight: 900;
      color: var(--gray-950);
    }

    .drawer-close {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 0;
      background: var(--gray-100);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .drawer-close svg {
      width: 20px;
      height: 20px;
      stroke: var(--gray-950);
      stroke-width: 2.3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drawer-body {
      padding: 18px 20px 140px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .drawer-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--gray-50);
      border: 1px solid rgba(148, 163, 184, 0.16);
      font-weight: 800;
      color: var(--gray-900);
    }

    .drawer-link-left {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .drawer-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drawer-bottom {
      margin-top: 8px;
      display: grid;
      gap: 10px;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      color: #fff;
      background: #040c18;
      padding-top: var(--header-h);
    }

    .hero-video,
    .hero-fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-fallback {
      background-image: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      display: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(79, 124, 255, 0.25), transparent 24%),
        linear-gradient(90deg, rgba(4, 12, 24, 0.82) 0%, rgba(4, 12, 24, 0.62) 50%, rgba(4, 12, 24, 0.74) 100%);
      z-index: 1;
    }

    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(320px, 0.88fr);
      gap: 36px;
      align-items: center;
      width: 100%;
      padding-top: 60px;
      padding-bottom: 60px;
    }

    .hero-copy {
      max-width: 760px;
    }

    .hero-badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      color: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .hero-badge svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(40px, 6vw, 78px);
      line-height: 1.08;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    .hero-title .line {
      display: block;
    }

    .hero-title .highlight {
      color: #b7cbff;
    }

    .hero-desc {
      margin: 22px 0 0;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.92;
      color: rgba(255, 255, 255, 0.86);
      max-width: 700px;
    }

    .hero-desc strong {
      color: #fff;
      font-weight: 900;
    }

    .hero-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .hero-mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 30px;
      max-width: 720px;
    }

    .hero-mini-card {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .hero-mini-card strong {
      display: block;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
    }

    .hero-mini-card span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.84);
    }

    .hero-panel {
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 22px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .hero-panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .hero-panel-title {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.32;
    }

    .hero-panel-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 12px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.92);
      flex-shrink: 0;
    }

    .hero-panel-chip svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hero-facts {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .hero-fact {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 12px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
    }

    .hero-fact:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .hero-fact svg {
      width: 22px;
      height: 22px;
      stroke: #d6e2ff;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-top: 2px;
    }

    .hero-fact strong {
      display: block;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.4;
      color: #fff;
    }

    .hero-fact p {
      margin: 5px 0 0;
      font-size: 14px;
      line-height: 1.72;
      color: rgba(255, 255, 255, 0.84);
    }

    .hero-bottom-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      background: linear-gradient(180deg, transparent, rgba(4, 12, 24, 0.82));
      padding-bottom: 24px;
    }

    .hero-quick-bar {
      width: min(100%, calc(var(--max) - 48px));
      margin: 0 auto;
      padding: 18px 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .quick-item {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      min-height: 82px;
    }

    .quick-item strong {
      display: block;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      line-height: 1.38;
    }

    .quick-item span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.58;
      color: rgba(255, 255, 255, 0.82);
    }

    .vision-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.03fr) minmax(360px, 0.97fr);
      gap: 28px;
      align-items: stretch;
    }

    .box {
      position: relative;
      border-radius: var(--radius-xl);
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .box-pad {
      padding: 34px;
    }

    .box-dark {
      background: linear-gradient(135deg, var(--navy-900), #17335f);
      color: #fff;
      border: 0;
      box-shadow: var(--shadow-md);
    }

    .vision-lead {
      font-size: clamp(28px, 3.5vw, 44px);
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
    }

    .vision-lead strong {
      color: var(--blue-700);
    }

    .vision-list {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .vision-item {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 16px;
      align-items: start;
      padding: 18px 18px 18px 0;
      border-top: 1px dashed rgba(148, 163, 184, 0.25);
    }

    .vision-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .vision-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--sky-100);
      color: var(--blue-700);
    }

    .vision-icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .vision-item strong {
      display: block;
      font-size: 18px;
